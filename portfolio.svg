<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%" fill="none">
  <defs>
    <!-- Dark Blue Theme Gradients -->
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e58ff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#0936cc" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-darkblue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001466" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#000622" stop-opacity="0" />
    </radialGradient>

    <!-- Blur Filter -->
    <filter id="blur-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="70" />
    </filter>
  </defs>

  <style>
    /* Slow ambient mesh animations */
    @keyframes float-1 {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }
    @keyframes float-2 {
      0% { transform: translate(0px, 0px) scale(0.95); }
      50% { transform: translate(-40px, 40px) scale(1.15); }
      100% { transform: translate(0px, 0px) scale(0.95); }
    }
    .blob-1 { animation: float-1 15s infinite ease-in-out; transform-origin: 200px 150px; }
    .blob-2 { animation: float-2 18s infinite ease-in-out; transform-origin: 600px 250px; }
    .blob-3 { animation: float-1 20s infinite ease-in-out reverse; transform-origin: 400px 100px; }
  </style>

  <!-- Deep Dark Background (from theme) -->
  <rect width="100%" height="100%" fill="#030508" rx="16" />

  <!-- Animated glowing background blobs -->
  <g filter="url(#blur-filter)">
    <circle class="blob-1" cx="200" cy="120" r="180" fill="url(#glow-cyan)" />
    <circle class="blob-2" cx="650" cy="280" r="220" fill="url(#glow-blue)" />
    <circle class="blob-3" cx="400" cy="200" r="250" fill="url(#glow-darkblue)" />
  </g>

  <!-- Clean Tech Grid Overlay -->
  <svg width="100%" height="100%">
    <defs>
      <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
        <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#4facfe" stroke-width="1" stroke-opacity="0.05" />
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid)" rx="16" />
  </svg>

  <!-- Responsive HTML Core -->
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" class="hero-container">
      <style>
        .hero-container {
          width: 100%;
          height: 100%;
          box-sizing: border-box;
          padding: 40px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          text-align: center;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
          color: #e2e8f0;
        }

        /* Top Badge */
        .badge {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          background: rgba(0, 242, 254, 0.05);
          border: 1px solid rgba(0, 242, 254, 0.15);
          padding: 8px 18px;
          border-radius: 100px;
          font-size: 12px;
          font-weight: 600;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          color: #e2e8f0;
          margin-bottom: 24px;
          box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .status-dot {
          width: 6px;
          height: 6px;
          background-color: #00f2fe;
          border-radius: 50%;
          box-shadow: 0 0 8px #00f2fe;
          animation: pulse 2s infinite;
        }

        /* Clean Developer Typography */
        .greeting {
          font-size: 16px;
          color: #94a3b8;
          margin-bottom: 8px;
          font-weight: 500;
        }

        .name {
          font-size: 52px;
          font-weight: 800;
          margin: 0;
          letter-spacing: -0.02em;
          color: #ffffff;
          line-height: 1.1;
        }

        /* Cyan/Blue gradient matching the theme's colors */
        .title-gradient {
          font-size: 22px;
          font-weight: 700;
          margin: 16px 0;
          background: linear-gradient(90deg, #00f2fe 0%, #4facfe 50%, #1e58ff 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          letter-spacing: -0.01em;
        }

        .tagline {
          font-size: 14px;
          line-height: 1.6;
          color: #94a3b8;
          max-width: 620px;
          margin: 0;
        }

        .logo {
          position: absolute;
          top: 30px;
          left: 40px;
          font-size: 18px;
          font-weight: 700;
          color: #ffffff;
          letter-spacing: 2px;
        }
        .logo-slash {
          color: #00f2fe;
        }

        @keyframes pulse {
          0% { transform: scale(0.9); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 242, 254, 0.7); }
          70% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 6px rgba(0, 242, 254, 0); }
          100% { transform: scale(0.9); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 242, 254, 0); }
        }

        /* 
          MOBILE RESPONSIVENESS IN SVG
          When the SVG is scaled down (e.g., physical width under 600px), 
          we INCREASE the font sizes relative to the viewBox. 
          This ensures they remain perfectly readable when the entire image shrinks!
        */
        @media (max-width: 600px) {
          .hero-container {
            padding: 24px;
          }
          .logo {
            display: none; /* Hide on small screens for cleaner layout */
          }
          .badge {
            font-size: 18px; /* Boosted for mobile legibility */
            padding: 10px 24px;
            margin-bottom: 32px;
          }
          .status-dot {
            width: 8px;
            height: 8px;
          }
          .greeting {
            font-size: 24px;
          }
          .name {
            font-size: 80px; /* Scaled up so it's readable when the image scales down */
            line-height: 1.1;
          }
          .title-gradient {
            font-size: 32px;
            margin: 24px 0;
          }
          .tagline {
            font-size: 22px;
            line-height: 1.5;
          }
        }
      </style>

      <div class="logo">&lt; BS <span class="logo-slash">/</span>&gt;</div>

      <div class="badge">
        <div class="status-dot"></div>
        Founding + Senior Software Engineer
      </div>
      
      <div class="greeting">Hi, I'm</div>
      <h1 class="name">Basantraj Shakti</h1>
      
      <div class="title-gradient">AlertMi and Lumit (Valco Melton)</div>
      
      <p class="tagline">
        Building high-performance frontend architectures, custom data visualizations, and robust on-premises multi-agent AI systems.
      </p>
    </div>
  </foreignObject>
</svg>
